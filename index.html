<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NL Social Media Post Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08);
    --border-strong: rgba(0,0,0,0.14);
    --text: #1a1a18;
    --text-2: #6b6a65;
    --text-3: #a8a79f;
    --green: #1D9E75;
    --green-bg: #e8f7f1;
    --green-text: #0c5c42;
    --purple-bg: #eeedfe;
    --purple-text: #3c3489;
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --pink-bg: #fbeaf0;
    --pink-text: #72243e;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --red-bg: #fcebeb;
    --red-text: #791f1f;
    --teal-bg: #e1f5ee;
    --teal-text: #085041;
    --gray-bg: #f1efe8;
    --gray-text: #444441;
    --coral-bg: #faece7;
    --coral-text: #712b13;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Top bar */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
  .logo span { color: var(--green); }
  .divider { width: 1px; height: 20px; background: var(--border-strong); }

  .month-nav { display: flex; align-items: center; gap: 10px; }
  .nav-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--text-2);
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .month-label { font-size: 15px; font-weight: 500; min-width: 130px; text-align: center; letter-spacing: -0.01em; }

  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn-outline {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border-strong);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-outline:hover { background: var(--surface2); color: var(--text); }
  .btn-primary {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #fff;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }

  /* Main content */
  .main { padding: 1.5rem 2rem 3rem; max-width: 1400px; margin: 0 auto; }

  /* Week block */
  .week-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .week-grid {
    display: grid;
    grid-template-columns: 100px repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }

  /* Day headers */
  .corner-header {
    padding: 10px 12px;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .corner-label { font-size: 10px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }

  .day-header {
    padding: 10px 8px;
    background: var(--surface2);
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .day-name { font-size: 10px; font-weight: 500; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
  .day-num { font-size: 20px; font-weight: 300; color: var(--text); margin-top: 2px; letter-spacing: -0.02em; }
  .day-header.today .day-num { color: var(--green); font-weight: 500; }
  .day-header.today .day-name { color: var(--green); }
  .day-header.other-month .day-num { color: var(--text-3); }

  /* Theme row */
  .theme-corner {
    padding: 6px 12px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--green-bg);
    display: flex; align-items: center;
  }
  .theme-corner-label { font-size: 9px; font-weight: 600; color: var(--green-text); text-transform: uppercase; letter-spacing: 0.07em; }
  .theme-cell {
    padding: 6px 6px;
    background: var(--green-bg);
    border-left: 1px solid rgba(29,158,117,0.15);
    border-bottom: 1px solid var(--border);
    text-align: center;
    display: flex; align-items: center; justify-content: center;
  }
  .theme-text { font-size: 9px; font-weight: 600; color: var(--green-text); text-transform: uppercase; letter-spacing: 0.05em; line-height: 1.3; }

  /* Platform rows */
  .platform-label {
    padding: 0 12px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    min-height: 38px;
    background: var(--surface);
  }
  .platform-label.section-start { border-top: 1px solid var(--border-strong); }

  .badge {
    font-size: 9px; font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .badge-ig { background: var(--purple-bg); color: var(--purple-text); }
  .badge-fb { background: var(--blue-bg); color: var(--blue-text); }
  .badge-story { background: var(--pink-bg); color: var(--pink-text); }
  .badge-yt { background: var(--red-bg); color: var(--red-text); }
  .badge-email { background: var(--amber-bg); color: var(--amber-text); }
  .badge-app { background: var(--teal-bg); color: var(--teal-text); }
  .badge-text { background: var(--gray-bg); color: var(--gray-text); }
  .badge-pod { background: var(--coral-bg); color: var(--coral-text); }

  .content-cell {
    border-left: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 38px;
    position: relative;
    background: var(--surface);
    transition: background 0.1s;
  }
  .content-cell:hover { background: #fafaf8; }
  .content-cell.section-start { border-top: 1px solid var(--border-strong); }

  .content-cell textarea {
    width: 100%; height: 100%; min-height: 38px;
    border: none; background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px; color: var(--text);
    resize: none; outline: none;
    padding: 8px 7px;
    line-height: 1.5;
    display: block;
  }
  .content-cell textarea::placeholder { color: var(--text-3); }

  /* Events footer */
  .week-footer {
    padding: 12px 16px;
    background: var(--surface2);
    display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap;
  }
  .events-label { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; padding-top: 5px; white-space: nowrap; }
  .events-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1; }
  .event-tag {
    font-size: 11px; padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.1s;
    display: flex; align-items: center; gap: 5px;
  }
  .event-tag:hover { border-color: #E24B4A; color: #E24B4A; }
  .event-input {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; padding: 4px 12px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    outline: none;
    width: 160px;
    transition: border 0.15s;
  }
  .event-input:focus { border-color: var(--green); }

  /* Print styles */
  @media print {
    .topbar { display: none; }
    .main { padding: 0; }
    .week-block { break-inside: avoid; margin-bottom: 1rem; border: 1px solid #ccc; }
    body { background: white; }
  }

  /* Saved indicator */
  .save-indicator {
    font-size: 11px; color: var(--green);
    opacity: 0; transition: opacity 0.3s;
    font-family: 'DM Mono', monospace;
  }
  .save-indicator.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="logo">NL <span>Social</span></span>
    <div class="divider"></div>
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
  </div>
  <div class="topbar-right">
    <span class="save-indicator" id="saveIndicator">Saved</span>
    <button class="btn-outline" onclick="clearWeek()">Clear week</button>
    <button class="btn-outline" onclick="window.print()">Print / PDF</button>
  </div>
</div>

<div class="main" id="main"></div>

<script>
const DAYS = ['Mo','Tu','We','Th','Fr','Sat','Sun'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

const THEMES = ['Sunday Content','Promo Events','Spiritual','TBD','','Sunday Push','Sunday Push & Recap'];

const PLATFORMS = [
  { key:'ig',    label:'IG',          badge:'badge-ig',    section:true  },
  { key:'fb',    label:'FB',          badge:'badge-fb',    section:false },
  { key:'story', label:'IG/FB Story', badge:'badge-story', section:false },
  { key:'email', label:'Email',       badge:'badge-email', section:true  },
  { key:'app',   label:'App',         badge:'badge-app',   section:false },
  { key:'text',  label:'Text',        badge:'badge-text',  section:false },
  { key:'yt',    label:'YT',          badge:'badge-yt',    section:true  },
  { key:'pod',   label:'Podcast',     badge:'badge-pod',   section:false },
];

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();

function isToday(d) {
  return d.getDate()===today.getDate() && d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear();
}

function getWeeks(year, month) {
  const weeks = [];
  const first = new Date(year, month, 1);
  let dow = first.getDay(); dow = dow===0?6:dow-1;
  let d = new Date(year, month, 1-dow);
  while(true) {
    const week = [];
    for(let i=0;i<7;i++){ week.push(new Date(d)); d.setDate(d.getDate()+1); }
    if(week.some(x=>x.getMonth()===month)) weeks.push(week);
    if(d.getMonth()>month || d.getFullYear()>year) break;
  }
  return weeks;
}

function saveKey(year, month, wi, di, pkey) { return `nl-${year}-${month}-w${wi}-d${di}-${pkey}`; }
function eventKey(year, month, wi) { return `nl-events-${year}-${month}-w${wi}`; }

function loadVal(key) { try { return localStorage.getItem(key)||''; } catch(e){ return ''; } }
function saveVal(key, val) { try { localStorage.setItem(key, val); showSaved(); } catch(e){} }
function loadEvents(key) { try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){ return []; } }
function saveEvents(key, arr) { try { localStorage.setItem(key, JSON.stringify(arr)); showSaved(); } catch(e){} }

let saveTimer;
function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>el.classList.remove('show'), 1500);
}

function render() {
  document.getElementById('monthLabel').textContent = MONTHS[currentMonth] + ' \'' + String(currentYear).slice(2);
  const main = document.getElementById('main');
  main.innerHTML = '';
  const weeks = getWeeks(currentYear, currentMonth);
  weeks.forEach((week, wi) => renderWeek(main, week, wi));
}

function renderWeek(container, week, wi) {
  const block = document.createElement('div');
  block.className = 'week-block';

  const grid = document.createElement('div');
  grid.className = 'week-grid';

  // Corner + day headers
  const corner = document.createElement('div');
  corner.className = 'corner-header';
  corner.innerHTML = `<span class="corner-label">Week ${wi+1}</span>`;
  grid.appendChild(corner);

  week.forEach((d,di) => {
    const cell = document.createElement('div');
    const other = d.getMonth()!==currentMonth;
    cell.className = 'day-header'+(isToday(d)?' today':'')+(other?' other-month':'');
    cell.innerHTML = `<div class="day-name">${DAYS[di]}</div><div class="day-num">${d.getDate()}</div>`;
    grid.appendChild(cell);
  });

  // Theme row
  const themeCorner = document.createElement('div');
  themeCorner.className = 'theme-corner';
  themeCorner.innerHTML = '<span class="theme-corner-label">Theme</span>';
  grid.appendChild(themeCorner);

  THEMES.forEach((theme) => {
    const cell = document.createElement('div');
    cell.className = 'theme-cell';
    cell.innerHTML = `<span class="theme-text">${theme}</span>`;
    grid.appendChild(cell);
  });

  // Platform rows
  PLATFORMS.forEach(p => {
    const label = document.createElement('div');
    label.className = 'platform-label'+(p.section?' section-start':'');
    label.innerHTML = `<span class="badge ${p.badge}">${p.label}</span>`;
    grid.appendChild(label);

    week.forEach((d,di) => {
      const cell = document.createElement('div');
      cell.className = 'content-cell'+(p.section?' section-start':'');
      const key = saveKey(currentYear, currentMonth, wi, di, p.key);
      const val = loadVal(key);
      const ta = document.createElement('textarea');
      ta.value = val;
      ta.placeholder = '';
      ta.addEventListener('input', () => {
        saveVal(key, ta.value);
        autoH(ta);
      });
      cell.appendChild(ta);
      grid.appendChild(cell);
    });
  });

  block.appendChild(grid);

  // Events footer
  const footer = document.createElement('div');
  footer.className = 'week-footer';
  footer.innerHTML = `<span class="events-label">Events</span><div class="events-tags" id="etags-${wi}"></div>`;
  block.appendChild(footer);
  container.appendChild(block);

  renderEvents(wi);

  grid.querySelectorAll('textarea').forEach(autoH);
}

function renderEvents(wi) {
  const key = eventKey(currentYear, currentMonth, wi);
  const events = loadEvents(key);
  const container = document.getElementById(`etags-${wi}`);
  if(!container) return;
  container.innerHTML = '';
  events.forEach(e => {
    const tag = document.createElement('span');
    tag.className = 'event-tag';
    tag.textContent = e;
    tag.title = 'Click to remove';
    tag.onclick = () => {
      const arr = loadEvents(key).filter(x=>x!==e);
      saveEvents(key, arr);
      renderEvents(wi);
    };
    container.appendChild(tag);
  });
  const input = document.createElement('input');
  input.className = 'event-input';
  input.placeholder = '+ Add event...';
  input.addEventListener('keydown', ev => {
    if(ev.key==='Enter' && input.value.trim()) {
      const arr = loadEvents(key);
      if(!arr.includes(input.value.trim())) arr.push(input.value.trim());
      saveEvents(key, arr);
      input.value = '';
      renderEvents(wi);
    }
  });
  container.appendChild(input);
}

function autoH(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.max(38, ta.scrollHeight)+'px';
}

function changeMonth(dir) {
  currentMonth += dir;
  if(currentMonth>11){currentMonth=0;currentYear++;}
  if(currentMonth<0){currentMonth=11;currentYear--;}
  render();
}

function clearWeek() {
  if(!confirm('Clear all content for this month? This cannot be undone.')) return;
  const weeks = getWeeks(currentYear, currentMonth);
  weeks.forEach((week, wi) => {
    PLATFORMS.forEach(p => {
      week.forEach((d,di) => {
        try { localStorage.removeItem(saveKey(currentYear,currentMonth,wi,di,p.key)); } catch(e){}
      });
    });
    try { localStorage.removeItem(eventKey(currentYear,currentMonth,wi)); } catch(e){}
  });
  render();
}

render();
</script>
</body>
</html>
